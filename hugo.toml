baseURL = 'https://example.org/'
title = 'Radio Communication Volunteers'
theme = 'docsy'

layoutDir = 'layouts'
contentDir = 'content'
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableMissingTranslationPlaceholders = true
enableRobotsTXT = true
enableGitInfo = true
pygmentsCodeFences = true
pygmentsUseClasses = false
pygmentsUseClassic = false
pygmentsStyle = "tango"

[taxonomies]
tag = "tags"
category = "categories"

[mediaTypes."text/redirects"]
delimiter = ""

# [outputFormats.redirects]
# baseName = "_redirects"
# isPlainText = true
# mediaType = "text/redirects"
# root = true

[permalinks]
blog = "/:section/:year/:month/:day/:slugorcontentbasename"

[imaging]
resampleFilter = "CatmullRom"
quality = 75
anchor = "Smart"

[markup.goldmark.parser.attribute]
block = true

[markup.goldmark.renderer]
unsafe = true

[markup.highlight]
style = "tango"
noClasses = false

[outputs]
home = [ "HTML", "print", "RSS"]
section = [ "HTML", "print", "RSS" ]

[params]
# privacy_policy = "https://policies.google.com/privacy"
version_menu = "Releases"
archived_version = false
version = "0.14.4-dev"
versionWithBuildId = "0.14.4-dev"
# github_repo = "https://github.com/google/docsy-example"
# github_project_repo = "https://github.com/google/docsy"
github_branch = "main"
gcs_engine_id = "..."
offlineSearch = false
prism_syntax_highlighting = false
# mainBranchPreviewURL = "https://main--goldydocs.netlify.app/"

# Docs helpers: use with _param
btn-lg = 'class="btn btn-lg btn-{1}" role="button"'
FA = '<i class="fa-{1} fa-{2} text-{3} px-1"></i>'

  [params.taxonomy]
  taxonomyCloud = [ "tags", "categories" ]
  taxonomyCloudTitle = [ "Tag Cloud", "Categories" ]
  taxonomyPageHeader = [ "tags", "categories" ]

  [params.copyright]
  authors = "Docsy Authors | [CC BY 4.0](https://creativecommons.org/licenses/by/4.0) |"
  from_year = 2018
  to_year = "present"

  # User interface configuration
  [params.ui]

  # Set to true to disable breadcrumb navigation.
  breadcrumb_disable = false

  # Set to false if you don't want to display a logo (/assets/icons/logo.svg) in the top navbar
  navbar_logo = true

  # Set to true if you don't want the top navbar to be translucent when over a `block/cover`, like on the homepage.
  navbar_translucent_over_cover_disable = false

  sidebar_menu_foldable = true

  # Enable to show the side bar menu in its compact state.
  sidebar_menu_compact = false

  # Set to true to hide the sidebar search box (the top nav search box will still be displayed if search is enabled)
  sidebar_search_disable = false

  # Enable light/dark mode toggle menu in the navbar
  showLightDarkModeMenu = true

    # Adds a H2 section titled "Feedback" to the bottom of each doc. The responses are sent to Google Analytics as events.
    # This feature depends on [services.googleAnalytics] and will be disabled if "services.googleAnalytics.id" is not set.
    # If you want this feature, but occasionally need to remove the "Feedback" section from a single page,
    # add "hide_feedback: true" to the page's front matter.
    [params.ui.feedback]
    enable = true
    # The responses that the user sees after clicking "yes" (the page was helpful) or "no" (the page was not helpful).
    yes = 'Glad to hear it! Please <a href="https://github.com/RadioCommunicationVolunteers/WebsiteDev/issues/new">tell us how we can improve</a>.'
    no = 'Sorry to hear that. Please <a href="https://github.com/RadioCommunicationVolunteers/WebsiteDev/issues/new">tell us how we can improve</a>.'

    # Adds a reading time to the top of each doc.
    # If you want this feature, but occasionally need to remove the Reading time from a single page,
    # add "hide_readingtime: true" to the page's front matter
    [params.ui.readingtime]
    enable = false

# End user relevant links. These will show up on left side of footer and in the community page if you have one.
[[params.links.user]]
name = "User mailing list"
url = "https://example.org/mail"
icon = "fa fa-envelope"
desc = "Discussion and help from your fellow users"

[[params.links.user]]
name = "X"
url = "https://example.org/x"
icon = "fab fa-x-twitter"
desc = "Follow us on X to get the latest news!"

[[params.links.user]]
name = "Stack Overflow"
url = "https://example.org/stack"
icon = "fab fa-stack-overflow"
desc = "Practical questions and curated answers"

# Developer relevant links. These will show up on right side of footer and in the community page if you have one.
[[params.links.developer]]
name = "Site info"
url = "/site/"
icon = "fa-solid fa-hammer"
desc = "Site build information."

[[params.links.developer]]
name = "GitHub"
url = "https://github.com/google/docsy"
icon = "fab fa-github"
desc = "Development takes place here!"

[[params.links.developer]]
name = "Slack"
url = "https://example.org/slack"
icon = "fab fa-slack"
desc = "Chat with other project developers"

[[params.links.developer]]
name = "Developer mailing list"
url = "https://example.org/mail"
icon = "fa fa-envelope"
desc = "Discuss development issues around the project"

# Netlify build env var
# [security.funcs]
# getenv = ["^(BRANCH|BUILD_ID|COMMIT_REF|CONTEXT|DEPLOY_ID|NETLIFY|PULL_REQUEST|REVIEW_ID)$"]

# [security.exec]
# osEnv = ['.*']

[module]
  # Uncomment the next line to build and serve using local docsy clone declared in the named Hugo workspace:
  # workspace: docsy.work
    [module.hugoVersion]
    extended = true
    min = "0.155.0"

    [[module.imports]]
    path = "docsy"
    disable = false

